query getMilestonedPullRequests($owner: String!, $repo: String!, $milestoneNumber: Int!, $cursor: String!) {
  repository(owner: $owner, name: $repo) {
    milestone(number: $milestoneNumber) {
      pullRequests(first: 20, states: [MERGED], labels: ["add to changelog"], after: $cursor)  {
        pageInfo {
          endCursor
          hasNextPage
        }
        nodes {
          number
          title
          body
          labels(first: 20) {
            nodes {
              name
            }
          }
          author {
            resourcePath
            login
          }
          headRefName
        }
      }
    }
  }
}

mutation createSignedCommitOnBranch(
  $repo: String!
  $branch: String!
  $oid: GitObjectID!
  $headline: String!
  $body: String!
  $additions: [FileAddition!]
  $deletions: [FileDeletion!]
) {
  createCommitOnBranch(
    input: {
      branch: { repositoryNameWithOwner: $repo, branchName: $branch }
      expectedHeadOid: $oid
      fileChanges: { additions: $additions, deletions: $deletions }
      message: { headline: $headline, body: $body }
    }
  ) {
    commit {
      url
      oid
    }
  }
}

query getMilestonesWithTitle($owner: String!, $repo: String!, $title: String!) {
  repository(owner: $owner, name: $repo) {
    milestones(query: $title, first: 30) {
      nodes {
        number
        id
        closed
        title
        closedAt
        dueOn
      }
    }
  }
}
